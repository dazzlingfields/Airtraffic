<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft Near Me</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0f1c;
  color:white;
}

#map {
  height: 70vh;
}

.panel {
  padding:15px;
  background:#111827;
  border-top:1px solid #1f2937;
}

h2 {
  margin:0 0 10px;
}

.info {
  font-size:14px;
  color:#9ca3af;
}

.highlight {
  color:#f59e0b;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <h2>Nearest Aircraft</h2>
  <div id="nearest">Locating...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API = "https://api.airplanes.live/v2/point/";
const RANGE_NM = 150;

let map = L.map("map").setView([-41,174],6);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png").addTo(map);

let aircraftMarkers = [];
let trails = {};

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return 2*R*Math.asin(Math.sqrt(a));
}

function clearMap() {
  aircraftMarkers.forEach(m => map.removeLayer(m));
  aircraftMarkers = [];
}

async function loadAircraft(lat, lon) {
  const res = await fetch(`${API}${lat}/${lon}/${RANGE_NM}`);
  const data = await res.json();
  return data.ac || [];
}

function renderAircraft(userLat, userLon, list) {
  clearMap();

  let nearest = null;
  let minDist = Infinity;

  list.forEach(ac => {
    if (!ac.lat || !ac.lon) return;

    const dist = haversine(userLat,userLon,ac.lat,ac.lon);

    if (dist < minDist) {
      minDist = dist;
      nearest = ac;
    }

    // trail
    if (!trails[ac.hex]) trails[ac.hex] = [];
    trails[ac.hex].push([ac.lat, ac.lon]);
    if (trails[ac.hex].length > 10) trails[ac.hex].shift();

    const marker = L.circleMarker([ac.lat, ac.lon], {
      radius: 5,
      color: "#34d399"
    }).addTo(map);

    marker.bindPopup(`
      <b>${ac.r || ac.hex}</b><br>
      Alt: ${ac.alt_baro || "?"} ft<br>
      Speed: ${ac.gs || "?"} kt
    `);

    aircraftMarkers.push(marker);

    // draw trail
    if (trails[ac.hex].length > 1) {
      const line = L.polyline(trails[ac.hex], {
        weight: 1,
        opacity: 0.5
      }).addTo(map);
      aircraftMarkers.push(line);
    }
  });

  // highlight nearest
  if (nearest) {
    document.getElementById("nearest").innerHTML = `
      <div class="highlight">${nearest.r || nearest.hex}</div>
      <div class="info">
        Altitude: ${nearest.alt_baro || "?"} ft<br>
        Speed: ${nearest.gs || "?"} kt<br>
        Distance: ${minDist.toFixed(1)} km
      </div>
    `;

    L.circleMarker([nearest.lat, nearest.lon], {
      radius: 8,
      color: "#f59e0b"
    }).addTo(map);
  }
}

function init() {
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    map.setView([lat, lon], 9);

    L.circleMarker([lat, lon], {
      radius: 6,
      color: "#38bdf8"
    }).addTo(map).bindPopup("You");

    async function update() {
      const aircraft = await loadAircraft(lat, lon);
      renderAircraft(lat, lon, aircraft);
    }

    update();
    setInterval(update, 5000);

  }, () => {
    document.getElementById("nearest").innerText = "Location denied.";
  });
}

init();
</script>

</body>
</html>
