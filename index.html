<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overhead · Aircraft Near Me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  color-scheme:light dark;
  --bg:#090e1e;--bg2:#0e1428;
  --panel:rgba(13,19,36,.92);--panel2:rgba(9,14,28,.95);
  --line:rgba(52,76,122,.3);--line2:rgba(72,106,162,.5);
  --tx:#dde8ff;--mu:#4a5e88;--mu2:#7090be;
  --A:#f59e0b;--G:#34d399;--C:#38bdf8;--R:#f87171;--O:#fb923c;
  --shad:0 18px 52px rgba(0,0,0,.55);
  --r:20px;--r2:12px;
  --font:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
@media(prefers-color-scheme:light){:root{
  --bg:#eef2fc;--bg2:#e4eaf8;
  --panel:rgba(255,255,255,.92);--panel2:rgba(246,250,255,.97);
  --line:rgba(144,168,210,.22);--line2:rgba(96,136,200,.4);
  --tx:#0d1828;--mu:#566480;--mu2:#7888a4;
  --shad:0 8px 32px rgba(10,22,58,.08);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 65% 45% at 8% 0%,rgba(56,189,248,.09),transparent 50%),
    radial-gradient(ellipse 48% 36% at 93% 10%,rgba(245,158,11,.07),transparent 45%);
  color:var(--tx);min-height:100%;font-size:14px;line-height:1.5;
}
@media(prefers-color-scheme:light){body{background-image:
    radial-gradient(ellipse 65% 45% at 8% 0%,rgba(56,189,248,.05),transparent 50%),
    radial-gradient(ellipse 48% 36% at 93% 10%,rgba(245,158,11,.04),transparent 45%);
}}
/* NAV */
.nav{
  position:sticky;top:0;z-index:300;height:50px;
  display:flex;align-items:center;gap:12px;padding:0 18px;
  background:color-mix(in srgb,var(--panel) 88%,transparent);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.nav-logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:800;letter-spacing:-.02em;flex-shrink:0;}
.logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,rgba(245,158,11,.24),rgba(56,189,248,.16));border:1px solid var(--line2);display:grid;place-items:center;}
.nav-div{width:1px;height:18px;background:var(--line);}
.nav-sub{font-size:11px;color:var(--mu2);font-weight:500;}
.nav-r{margin-left:auto;}
.sp{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.02);font-size:11px;font-weight:700;letter-spacing:.02em;transition:color .3s;}
.sd{width:6px;height:6px;border-radius:50%;background:var(--G);flex-shrink:0;box-shadow:0 0 0 3px rgba(52,211,153,.16);animation:blink 2.8s ease-in-out infinite;}
.sd.warn{background:var(--A);box-shadow:0 0 0 3px rgba(245,158,11,.16);}
.sd.bad{background:var(--R);box-shadow:0 0 0 3px rgba(248,113,113,.16);animation:none;}
@keyframes blink{0%,100%{box-shadow:0 0 0 3px rgba(52,211,153,.16)}50%{box-shadow:0 0 0 7px rgba(52,211,153,.03)}}
/* LAYOUT */
.wrap{max-width:1560px;margin:0 auto;padding:14px 14px 36px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shad);overflow:hidden;}
/* NEAREST BANNER */
.nearest{
  padding:18px 20px 16px;margin-bottom:13px;
  background:linear-gradient(135deg,rgba(245,158,11,.06) 0%,rgba(56,189,248,.03) 100%),var(--panel);
  position:relative;overflow:hidden;
}
.nearest::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(56,189,248,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.022) 1px,transparent 1px);
  background-size:32px 32px;
}
@media(prefers-color-scheme:light){.nearest::before{background-image:
    linear-gradient(rgba(56,189,248,.038) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,.038) 1px,transparent 1px);
}}
.nc-ey{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--mu2);margin-bottom:11px;position:relative;}
.nc-body{display:grid;grid-template-columns:88px 1fr auto;gap:16px;align-items:start;position:relative;}
.ac-photo{width:88px;height:66px;border-radius:10px;overflow:hidden;border:1px solid var(--line2);background:linear-gradient(135deg,rgba(245,158,11,.14),rgba(56,189,248,.09));display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--mu);font-size:10px;text-align:center;padding:4px;line-height:1.4;}
.ac-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.nc-main{min-width:0;}
.reg-big{font-family:var(--mono);font-size:clamp(20px,2.8vw,38px);font-weight:700;line-height:1;letter-spacing:-.015em;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid var(--line);background:rgba(255,255,255,.025);color:var(--mu2);}
.tag.live{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.07);color:var(--G);}
.tag.amb{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.07);color:var(--A);}
.tag.cyn{border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.07);color:var(--C);}
.tag.red{border-color:rgba(248,113,113,.42);background:rgba(248,113,113,.09);color:var(--R);animation:sqwarn 1.8s ease-in-out infinite;}
@keyframes sqwarn{0%,100%{background:rgba(248,113,113,.09)}50%{background:rgba(248,113,113,.22)}}
.smini{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:7px;margin-top:11px;}
.sm .k{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.11em;color:var(--mu);margin-bottom:2px;}
.sm .v{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--tx);}
.sm .v.live{color:var(--G);}.sm .v.amb{color:var(--A);}
/* ROUTE COL */
.route-col{width:210px;flex-shrink:0;}
.rbox{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r2);padding:12px 14px;}
.raps{display:flex;align-items:flex-start;gap:5px;}
.rap{flex:1;min-width:0;}
.rap-c{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1;}
.rap-n{font-size:10px;color:var(--mu2);line-height:1.35;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rarr{display:flex;flex-direction:column;align-items:center;gap:2px;padding-top:3px;flex-shrink:0;}
.rpct{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--A);}
.pbar{height:5px;border-radius:999px;background:rgba(148,163,184,.13);overflow:hidden;margin:9px 0 5px;}
.pfil{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--C),var(--A),var(--R));transition:width .7s ease;}
.pmeta{display:flex;justify-content:space-between;font-size:10px;color:var(--mu2);font-family:var(--mono);}
.rnone{font-size:11px;color:var(--mu);text-align:center;padding:10px 0;line-height:1.6;}
/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 330px;gap:13px;align-items:start;}
.map-card{padding:13px;}
.map-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.map-title{font-size:14px;font-weight:800;letter-spacing:-.02em;}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--G);}
#map{height:70vh;min-height:500px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--line);}
.map-leg{display:flex;flex-wrap:wrap;gap:10px;margin-top:9px;font-size:11px;color:var(--mu2);align-items:center;}
.mleg{display:flex;align-items:center;gap:5px;}
.mleg-line{width:20px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--C),var(--A),var(--R));}
.mleg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
/* SIDEBAR */
.sidebar{display:grid;gap:13px;}
.plabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--mu2);margin-bottom:11px;}
.phead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px;}
.spill{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--A);background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.22);border-radius:999px;padding:3px 10px;}
.cp{padding:16px;}
.dtbl{display:grid;gap:4px;}
.drow{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:6px 10px;background:var(--panel2);border-radius:8px;border:1px solid var(--line);font-size:12px;}
.dk{color:var(--mu2);font-weight:500;flex-shrink:0;}
.dv{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--tx);text-align:right;word-break:break-all;}
.dv.live{color:var(--G);}.dv.amb{color:var(--A);}.dv.red{color:var(--R);}
.sph{height:110px;border-radius:9px;overflow:hidden;border:1px solid var(--line);margin-bottom:11px;}
.sph img{width:100%;height:100%;object-fit:cover;display:block;}
.nb-list{display:grid;gap:6px;margin-top:10px;}
.nb-btn{width:100%;text-align:left;border:none;cursor:pointer;padding:9px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--tx);font-family:var(--font);display:flex;align-items:center;justify-content:space-between;gap:8px;transition:border-color .14s,background .14s;}
.nb-btn:hover{border-color:var(--line2);}
.nb-btn.active{border-color:var(--A);background:rgba(245,158,11,.04);}
.nb-l{min-width:0;}
.nb-reg{font-family:var(--mono);font-weight:700;font-size:13px;}
.nb-meta{font-size:11px;color:var(--mu2);margin-top:1px;line-height:1.4;}
.nb-dist{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--mu2);flex-shrink:0;}
.nb-sq{color:var(--R);font-weight:700;}
.empty{border:1px dashed rgba(68,90,136,.26);border-radius:11px;padding:18px;text-align:center;color:var(--mu2);font-size:12px;line-height:1.65;}
/* LEAFLET */
.leaflet-popup-content-wrapper,.leaflet-popup-tip{
  background:rgba(8,12,26,.97)!important;color:var(--tx)!important;
  border:1px solid var(--line2)!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important;border-radius:12px!important;
}
@media(prefers-color-scheme:light){.leaflet-popup-content-wrapper,.leaflet-popup-tip{
  background:rgba(255,255,255,.98)!important;color:#0d1828!important;
  border-color:rgba(96,136,200,.38)!important;box-shadow:0 8px 32px rgba(10,22,58,.18)!important;
}}
.leaflet-popup-content{margin:11px 14px!important;min-width:130px;}
.pp-reg{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--A);margin-bottom:5px;}
.pp-row{font-size:12px;color:var(--mu2);line-height:1.7;}
.pp-row b{color:var(--tx);font-weight:600;}
@media(prefers-color-scheme:light){.pp-reg{color:#d97706;}.pp-row{color:#566480;}.pp-row b{color:#0d1828;}}
.pp-btn{margin-top:8px;width:100%;display:block;text-align:center;background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.26);color:var(--A);border-radius:7px;padding:5px 10px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;}
.pp-btn:hover{background:rgba(245,158,11,.2);}
@media(prefers-color-scheme:light){.pp-btn{color:#d97706;border-color:rgba(217,119,6,.26);background:rgba(245,158,11,.05);}}
.user-dot{width:11px;height:11px;border-radius:50%;background:var(--C);border:2px solid white;box-shadow:0 0 0 5px rgba(56,189,248,.18),0 2px 8px rgba(0,0,0,.4);}
/* RESPONSIVE */
@media(max-width:1100px){.main-grid{grid-template-columns:1fr;}#map{height:56vh;min-height:420px;}}
@media(max-width:820px){.nc-body{grid-template-columns:1fr;}.route-col{width:100%;}.ac-photo{width:100%;height:130px;}}
@media(max-width:540px){.wrap{padding:10px 10px 26px;}.nav{padding:0 12px;}.nearest{padding:13px;}.smini{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--A)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 4-4 4-3-1-2 2 5 5 2-2-1-3 4-4 4 6 1.2-.7c.4-.2.7-.6.6-1.1z"/>
      </svg>
    </div>
    Overhead
  </div>
  <div class="nav-div"></div>
  <span class="nav-sub">Aircraft Near Me</span>
  <div class="nav-r">
    <div class="sp" id="sPill">
      <span class="sd warn" id="sDot"></span>
      <span id="sText">Locating&hellip;</span>
    </div>
  </div>
</nav>

<main class="wrap">
  <div class="card nearest" id="nearestCard">
    <div class="empty">Waiting for location permission&hellip;</div>
  </div>
  <div class="main-grid">
    <div class="card map-card">
      <div class="map-head">
        <div class="map-title">Live Radar</div>
        <div class="live-badge">
          <span class="sd" style="animation:blink 2.8s ease-in-out infinite;flex-shrink:0"></span>
          <span id="trafficCount">Scanning</span>
        </div>
      </div>
      <div id="map"></div>
      <div class="map-leg">
        <div class="mleg"><div class="mleg-dot" style="background:var(--C)"></div>You</div>
        <div class="mleg"><div class="mleg-dot" style="background:var(--G)"></div>Aircraft</div>
        <div class="mleg"><div class="mleg-line"></div>Trail (speed &amp; alt)</div>
        <div class="mleg" style="gap:4px">
          Alt:
          <div class="mleg-dot" style="background:#6b7280;margin-left:2px"></div>
          <div class="mleg-dot" style="background:#f59e0b"></div>
          <div class="mleg-dot" style="background:#34d399"></div>
          <div class="mleg-dot" style="background:#38bdf8"></div>
          <div class="mleg-dot" style="background:#a78bfa"></div>
        </div>
        <div class="mleg" style="gap:4px;color:var(--mu)">Pan map to load more</div>
      </div>
    </div>
    <aside class="sidebar">
      <div class="card cp">
        <div class="phead">
          <div class="plabel">Selected Aircraft</div>
          <div class="spill" id="selPill">None</div>
        </div>
        <div id="selCard"><div class="empty">Tap any aircraft on the map or list.</div></div>
      </div>
      <div class="card cp">
        <div class="phead" style="margin-bottom:5px">
          <div class="plabel">Nearby Traffic</div>
          <span style="font-size:11px;color:var(--mu2)">Tap to inspect</span>
        </div>
        <div id="nbList" class="nb-list"><div class="empty">Waiting for data&hellip;</div></div>
      </div>
    </aside>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

(()=>{
'use strict';
/* ── CONSTANTS ── */
const API='https://api.airplanes.live';
const DB='https://api.adsbdb.com/v0';
const USER_RANGE=150; /* NM around user for the nearby list */
const REFRESH_MS=8000;
const PAN_DEBOUNCE=900;
const MAX_HIST=24;
const MIN_REFETCH_NM=40; /* don't re-pan-fetch if center moved <40 NM */

/* ── STATE ── */
const S={
  map:null,userLayer:null,planeLayer:null,trailLayer:null,ringLayer:null,tileLayer:null,
  user:null,
  nearby:[],            /* sorted by dist from user – for sidebar list */
  allAC:new Map(),      /* all aircraft seen – for full map render */
  selectedKey:null,selectedInfo:null,
  histories:new Map(),
  didInitialFit:false,refreshTimer:null,panTimer:null,
  panLat:null,panLon:null,  /* last map-pan fetch center */
};

/* ── UTILS ── */
const el=id=>document.getElementById(id);
const norm=v=>String(v||'').trim().toUpperCase().replace(/\s+/g,'');
const keyFor=ac=>norm(ac.reg||ac.r||ac.callsign||ac.flight||ac.hex||'');
const pickN=(...vv)=>{for(const v of vv){const n=Number(v);if(!isNaN(n)&&isFinite(n))return n;}return null;};
const R2D=Math.PI/180;
function hav(la1,lo1,la2,lo2){
  const d=(la2-la1)*R2D,e=(lo2-lo1)*R2D;
  return 2*6371*Math.asin(Math.sqrt(Math.sin(d/2)**2+Math.cos(la1*R2D)*Math.cos(la2*R2D)*Math.sin(e/2)**2));
}
const nmBtw=(a,b)=>hav(a[0],a[1],b[0],b[1])/1.852;

/* ── FORMATTERS ── */
const fmtAlt=ac=>{
  const v=ac?.alt_baro??ac?.altitude??ac?.alt;
  if(v==null||v==='')return'—';
  if(String(v).toLowerCase()==='ground')return'Ground';
  const n=Number(v);return isNaN(n)?String(v):`${n.toLocaleString()} ft`;
};
const fmtSpd=ac=>{const v=pickN(ac?.gs,ac?.speed,ac?.ground_speed);return v==null?'—':`${Math.round(v)} kt`;};
const fmtCoords=(la,lo)=>la==null||lo==null?'—':`${la.toFixed(4)}, ${lo.toFixed(4)}`;
const fmtAgo=v=>{
  if(v==null||v==='')return'—';const n=Number(v);if(isNaN(n))return String(v);
  if(n<60)return`${Math.round(n)}s ago`;if(n<3600)return`${Math.round(n/60)}m ago`;return`${Math.round(n/3600)}h ago`;
};
const fmtTrack=ac=>{
  const t=pickN(ac?.track,ac?.mag_heading,ac?.true_heading);if(t==null)return'—';
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const d=((t%360)+360)%360;return`${Math.round(d)}\u00b0 ${dirs[Math.round(d/22.5)%16]}`;
};
const fmtClimb=ac=>{
  const r=pickN(ac?.baro_rate,ac?.geom_rate,ac?.vertical_rate);
  if(r==null)return'—';if(Math.abs(r)<64)return'Level';
  return`${r>0?'\u2191':'\u2193'} ${Math.abs(Math.round(r)).toLocaleString()} fpm`;
};
const isAirborne=ac=>{
  if(!ac)return false;
  if(ac.on_ground===true||ac.gnd===true)return false;
  if(String(ac.alt_baro||'').toLowerCase()==='ground')return false;
  const a=pickN(ac.alt_baro,ac.altitude,ac.alt);return a!=null&&a>0;
};

/* ── SQUAWK DECODER ── */
const SQ={7500:'\u26a0 HIJACK',7600:'RADIO FAIL',7700:'\u26a0 EMERGENCY',7777:'MIL INTERCEPT',1200:'VFR',2000:'IFR'};
function sqInfo(raw){
  const s=String(raw||'').trim();if(!s||s==='0000')return null;
  return{code:s,label:SQ[parseInt(s)]||null,alert:s==='7500'||s==='7700'};
}

/* ── AIRCRAFT TYPE CLASSIFICATION ──────────────────────────────────────────
   Uses the ADS-B emitter category field FIRST (most reliable when present),
   then falls back to ICAO type-code regex matching.
   
   Category codes from airplanes.live:
     A1=Light(<15500lb)  A2=Small  A3=Large  A4=HighVortex  A5=Heavy
     A6=HighPerf  A7=ROTORCRAFT  B1=Glider  B2=Balloon
     B4=Ultralight  C1=LandVehicle
   ─────────────────────────────────────────────────────────────────────── */
function classifyAC(raw){
  const cat=String(raw?.category||'').toUpperCase().trim();
  const t=String(raw?.t||raw?.type||'').toUpperCase().replace(/[-\s]/g,'');

  /* Category-based – authoritative */
  if(cat==='A7')return'heli';
  if(cat==='B1')return'glider';
  if(cat==='B4')return'ultralight';

  if(!t)return'def';

  /* ── HELICOPTERS ── comprehensive ICAO type code list
     The previous impl missed most helis because it relied on category alone.
     We now match every common rotorcraft code. */
  if(
    /* Airbus Helicopters (old EC / AS prefix) */
    /^EC[0-9]/.test(t)||
    /^AS3[0-9]{2}$/.test(t)||/^AS5[0-9]{2}$/.test(t)||
    /* Airbus Helicopters (new H1xx names: H125,H130,H135,H145,H155,H160,H175) */
    /^H1[0-9]{2}$/.test(t)||
    /* Robinson – R22, R44, R66 */
    /^R(22|44|66)$/.test(t)||
    /* Sikorsky – S61,S70,S76,S92 etc. (NOT S2T turboprop!) */
    /^S(61|70|76|92)$/.test(t)||
    /^UH[0-9]{1,2}[A-Z]?$/.test(t)||/^HH[0-9]{1,2}$/.test(t)||
    /^SH[0-9]{1,2}$/.test(t)||
    /* Leonardo/AgustaWestland – AW109,AW119,AW139,AW169,AW189 */
    /^AW[0-9]{3}$/.test(t)||/^A(109|119|129|139|169|189)$/.test(t)||
    /* Bell (B0x = B206 family, B1x = B212/214, B47=old Bell 47) */
    /^B0[4-9]$/.test(t)||/^B4[0-9]$/.test(t)||/^B47$/.test(t)||
    /^(B212|B214|B222|B230|B430|B429|B412|B427)$/.test(t)||
    /* Military rotorcraft */
    /^CH[34567][0-9]$/.test(t)||
    /^MH[0-9]{1,2}$/.test(t)||/^AH[0-9]{1,2}[A-Z]?$/.test(t)||
    /^OH[0-9]{2}$/.test(t)||/^HX[0-9]/.test(t)||
    /^NH90$/.test(t)||/^VH60$/.test(t)||
    /* MD Helicopters – MD500,MD520,MD530,MD600,MD902 (NOT MD80/90 jets!) */
    /^MD[5-9][0-9]{2}$/.test(t)||
    /* Mil/Kamov (Russian) */
    /^MI[0-9]{1,2}[A-Z]?$/.test(t)||/^KA[0-9]{2}$/.test(t)||
    /* Misc */
    /^KMAX$/.test(t)||/^HELI$/.test(t)||/^GYRO$/.test(t)||/^ROTO$/.test(t)
  )return'heli';

  /* ── WIDE-BODY JETS ── */
  if(/^(B74[2-9S]|B748|B77[23LW]|B77X|B78[789X]|A33[02-9]|A340|A34[259]|A35[06K]|A38[0-9F]|MD11|DC10|L101)/.test(t))return'wide';

  /* ── NARROW-BODY JETS ── */
  if(/^(B73[5-9GHIJ]|B38M|B39M|A31[89]|A32[012FMNO]|A318|A319|A320|A321|MD8[0-9]|MD9[012]|DC9|B712|B722|B752|B753|E19[05]|BCS[123]|CS[13])/.test(t))return'narrow';

  /* ── BUSINESS JETS ── */
  if(/^(C25[0-9ABCM]|C5[126][0-9]|C56X|C650|C68[0A]|C700|C750|GL[456-9]|GLEX|G[23456][0-9]{2}|G280|G700|GALX|LJ[0-9]{2}|FA[2-9][0-9]|FA7X|FA8X|F2TH|PC24|CL[36][0-9]|CL60|H25[0-9ABC]|E50P|E55P|PRM1|SBRL|WW[234][0-9]|ASTR|HA4T|GAL[FX])/.test(t))return'bizjet';

  /* ── REGIONAL JETS & TURBOFANS ── */
  if(/^(CRJ[1279X]|E1[34][0-9]|E145|E170|E175|ERJ|AT[457][0-9]|AT7[56])/.test(t))return'regional';

  /* ── TURBOPROPS ── */
  if(/^(DH8[ABCD]|DHC[678]|Q[234][0-9]|SF3[24]|SB20|BE[23][0-9]|PC12|PC[67]|C212|BN2|JS[34][0-9]|L410|AN[0-9]{1,2}|DO[0-9]{2}|TP14|CN[23][0-9]|PAC7|KODE)/.test(t))return'turboprop';

  /* ── PISTON TWINS ── */
  if(/^(BE5[5-9]|BE58|BE76|PA[23][134]|PA44|C30[2-9]|C31[0-9]|C33[0-9]|C34[02]|C40[2-9]|C41[0-9]|C42[015]|V35|TW[0-9])/.test(t))return'piston-twin';

  /* ── PISTON SINGLES ── */
  if(/^(C1[5-9][0-9]|C172|C150|C152|C162|C177|C180|C182|C185|PA18|PA22|PA24|PA28|P28[ABT]|DA20|DA40|SR20|SR22|RV[3-9]|RV10|CTLS|CT2K|DIMO|JABI|MOSE)/.test(t))return'piston-single';

  /* ── GLIDERS ── */
  if(/^(ASK|ASG|ASH|ASW|LS[0-9]|SZD|DG[0-9]{2}|PIK|DISC|NIMB|VENT|PW[56]|K8|K13|K21|GLAS|BLAN)/.test(t))return'glider';

  /* ── ULTRALIGHT / MICROLIGHT ── */
  if(/^(ULAC|ULTR|MOTO|FOUR|JABIRU|EURO|IKARUS|SSEA|A22)/.test(t))return'ultralight';

  /* ── MILITARY JETS ── */
  if(/^(F1[5-8][A-Z]?|F22|F35[ABC]?|B52|B2[A]?|B21|C130|C17A|C5M|P8[A]?|KC[13][0-9]|A10|E3[TF]|U2|SR71|AV8|HARR|VIPA|HAWK|TICO|ALPH)/.test(t))return'military';

  return'def';
}

/* ── ICON SIZES ── */
const ISIZES={wide:36,narrow:32,bizjet:28,regional:26,turboprop:26,'piston-single':22,'piston-twin':24,heli:28,military:28,glider:28,ultralight:22,def:30};

/* ── ICON COLOUR: altitude-banded ── */
function iconColor(raw){
  const a=pickN(raw?.alt_baro,raw?.altitude,raw?.alt);
  const gnd=raw?.on_ground===true||raw?.gnd===true||String(raw?.alt_baro||'').toLowerCase()==='ground';
  if(gnd||a===0)return'#6b7280';
  if(a==null)return'#34d399';
  if(a<3000)return'#f59e0b';
  if(a<12000)return'#fbbf24';
  if(a<25000)return'#34d399';
  if(a<36000)return'#38bdf8';
  return'#a78bfa';
}

/* ── LEAFLET ICON FACTORY ── */
function makeIcon(item,sel=false){
  const kind=classifyAC(item.raw||{});
  const track=pickN(item.raw?.track,item.raw?.mag_heading,item.raw?.true_heading)||0;
  const color=sel?'#f59e0b':iconColor(item.raw||{});
  const glow=sel?'filter:drop-shadow(0 0 6px rgba(245,158,11,.95))':'';
  const sz=ISIZES[kind]||30;
  const body=(SHAPES[kind]||SHAPES.def)(color);
  const h=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="${sz}" height="${sz}" style="transform:rotate(${track}deg);display:block;${glow}">${body}</svg>`;
  return L.divIcon({html:h,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-(sz/2+5)]});
}
const makeUserIcon=()=>L.divIcon({html:'<div class="user-dot"></div>',className:'',iconSize:[11,11],iconAnchor:[5.5,5.5]});

/* ── TRAIL COLOUR ── */
function trailCol(spd,alt){
  const sp=isFinite(Number(spd))?Math.max(0,Math.min(1,Number(spd)/520)):.3;
  const ap=isFinite(Number(alt))?Math.max(0,Math.min(1,Number(alt)/42000)):.3;
  return`hsl(${(10+sp*200).toFixed(0)} 82% ${(30+ap*24).toFixed(0)}%)`;
}

/* ── STATUS ── */
function setStatus(txt,tone='live'){
  el('sText').textContent=txt;
  const d=el('sDot');
  d.className='sd'+(tone==='warn'?' warn':tone==='bad'?' bad':'');
  el('sPill').style.color=tone==='live'?'var(--G)':tone==='warn'?'var(--A)':'var(--R)';
}

/* ── MAP SETUP ── */
const isDark=()=>window.matchMedia?.('(prefers-color-scheme: dark)').matches;
const tileUrl=()=>isDark()
  ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
  :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

function ensureMap(){
  if(S.map)return;
  S.map=L.map('map',{zoomControl:true,attributionControl:false}).setView([-41.29,174.78],7);
  S.tileLayer=L.tileLayer(tileUrl(),{maxZoom:19,subdomains:'abcd'}).addTo(S.map);
  S.ringLayer=L.layerGroup().addTo(S.map);
  S.trailLayer=L.layerGroup().addTo(S.map);
  S.planeLayer=L.layerGroup().addTo(S.map);
  S.userLayer=L.layerGroup().addTo(S.map);
  /* Pan / zoom → load aircraft for new view */
  S.map.on('moveend',()=>{
    clearTimeout(S.panTimer);
    S.panTimer=setTimeout(fetchForView,PAN_DEBOUNCE);
  });
}
function syncTile(){
  if(!S.map||!S.tileLayer)return;
  const u=tileUrl();if(S.tileLayer._url===u)return;
  S.map.removeLayer(S.tileLayer);
  S.tileLayer=L.tileLayer(u,{maxZoom:19,subdomains:'abcd'}).addTo(S.map);
}
if(window.matchMedia){const mq=window.matchMedia('(prefers-color-scheme: dark)');(mq.addEventListener?mq.addEventListener.bind(mq,'change',syncTile):mq.addListener.bind(mq,syncTile))();}

function drawRings(la,lo){
  S.ringLayer.clearLayers();
  [50,100,150].forEach(nm=>L.circle([la,lo],{radius:nm*1852,color:'rgba(56,189,248,.08)',fill:false,weight:1,dashArray:'4 8'}).addTo(S.ringLayer));
}

/* ── PAN FETCH ── */
async function fetchForView(){
  if(!S.map)return;
  const c=S.map.getCenter();
  /* Skip if we haven't moved enough from last pan-fetch center */
  if(S.panLat!=null&&hav(c.lat,c.lng,S.panLat,S.panLon)/1.852<MIN_REFETCH_NM)return;
  S.panLat=c.lat;S.panLon=c.lng;
  /* Radius: distance from center to corner of visible bounds + 10 NM padding */
  const b=S.map.getBounds(),ne=b.getNorthEast();
  const radiusNm=Math.min(Math.ceil(hav(c.lat,c.lng,ne.lat,ne.lng)/1.852)+10,250);
  try{
    const pl=await fetchJSON(`${API}/v2/point/${c.lat}/${c.lng}/${radiusNm}`);
    const aircraft=pl?.ac||pl?.aircraft||[];
    mergeAircraft(aircraft,false);
    renderPlaneLayer();
    el('trafficCount').textContent=`${S.allAC.size} aircraft`;
  }catch(_){}
}

/* ── MERGE AIRCRAFT INTO allAC ── */
function mergeAircraft(aircraft,isUserQuery){
  const now=Date.now();
  for(const ac of aircraft){
    const lat=pickN(ac.lat,ac.latitude),lon=pickN(ac.lon,ac.longitude);
    if(lat==null||lon==null)continue;
    const key=keyFor({reg:ac.r||ac.reg,callsign:ac.flight||ac.callsign,hex:ac.hex});
    const prev=S.allAC.get(key)||{};
    const distKm=S.user?hav(S.user.lat,S.user.lon,lat,lon):9999;
    const item={
      key,lat,lon,distKm,distNm:distKm/1.852,
      reg:norm(ac.r||ac.reg),hex:norm(ac.hex),
      callsign:norm(ac.flight||ac.callsign),
      firstSeen:prev.firstSeen||now,
      raw:ac,live:ac,
      meta:prev.meta||null,route:prev.route||null,
    };
    S.allAC.set(key,item);
    addHist(item);
  }
  /* Rebuild nearby from allAC if this was the user query */
  if(isUserQuery&&S.user){
    S.nearby=Array.from(S.allAC.values())
      .filter(i=>i.distKm<USER_RANGE*1.852)
      .sort((a,b)=>a.distKm-b.distKm);
  }
}

/* ── HISTORY ── */
function addHist(item){
  if(!item.key)return;
  const list=S.histories.get(item.key)||[];
  const pt={lat:item.lat,lon:item.lon,ts:Date.now(),
    speed:pickN(item.raw?.gs,item.raw?.speed,item.raw?.ground_speed)??0,
    alt:pickN(item.raw?.alt_baro,item.raw?.altitude,item.raw?.alt)??0};
  const last=list[list.length-1];
  if(!last||hav(last.lat,last.lon,pt.lat,pt.lon)>0.2){
    list.push(pt);if(list.length>MAX_HIST)list.shift();S.histories.set(item.key,list);
  }
}

/* ── ROUTE PROGRESS (haversine-based, no projection errors) ── */
function routeProg(route,live){
  const o=route?.origin,d=route?.destination;
  const lat=pickN(live?.lat,live?.latitude),lon=pickN(live?.lon,live?.longitude);
  const oLat=pickN(o?.latitude,o?.lat),oLon=pickN(o?.longitude,o?.lon);
  const dLat=pickN(d?.latitude,d?.lat),dLon=pickN(d?.longitude,d?.lon);
  if(oLat==null||oLon==null||dLat==null||dLon==null||lat==null||lon==null)return null;
  const totalNm=nmBtw([oLat,oLon],[dLat,dLon]);
  if(totalNm<10)return null;
  const doneNm=nmBtw([oLat,oLon],[lat,lon]);
  const remainNm=Math.max(0,totalNm-doneNm);
  const pct=Math.round(Math.max(0,Math.min(100,doneNm/totalNm*100)));
  const gs=pickN(live?.gs,live?.speed,live?.ground_speed);
  const eta=(gs&&gs>30)?new Date(Date.now()+(remainNm/gs)*3600*1000):null;
  return{pct,totalNm,doneNm,remainNm,eta};
}
const fmtETA=eta=>eta?eta.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):null;

/* ── ROUTE HTML ── */
function routeHtml(route,live){
  if(!route)return`<div class="rnone">No route data for this flight</div>`;
  const o=route.origin,d=route.destination;
  const oC=o?(o.iata_code||o.icao_code||'?'):'?';
  const dC=d?(d.iata_code||d.icao_code||'?'):'?';
  const prog=routeProg(route,live);
  const pct=prog?.pct??0;
  const left=prog?`${prog.doneNm.toFixed(0)}\u202fNM done`:'En\u00a0route';
  const right=prog?.eta?`ETA\u00a0${fmtETA(prog.eta)}`:prog?`${prog.remainNm.toFixed(0)}\u202fNM left`:'\u2014';
  return`<div class="raps">
    <div class="rap"><div class="rap-c">${oC}</div><div class="rap-n">${o?.name||'\u2014'}</div></div>
    <div class="rarr">
      <div class="rpct">${prog?pct+'%':''}</div>
      <svg width="14" height="9" viewBox="0 0 14 9" fill="none">
        <path d="M0 4.5H11M7.5 1.5L11 4.5L7.5 7.5" stroke="var(--mu2)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="rap" style="text-align:right"><div class="rap-c">${dC}</div><div class="rap-n">${d?.name||'\u2014'}</div></div>
  </div>
  <div class="pbar"><div class="pfil" style="width:${pct}%"></div></div>
  <div class="pmeta"><span>${left}</span><span>${right}</span></div>`;
}

/* ── POPUP ── */
function buildPopup(item){
  const type=item.raw?.t||item.raw?.type||item.meta?.icao_type||'\u2014';
  const cs=norm(item.raw?.flight||item.raw?.callsign||item.callsign);
  const sq=sqInfo(item.raw?.squawk);
  const sqH=sq?` &middot; <b style="color:${sq.alert?'var(--R)':'var(--A)'}">${sq.code}${sq.label?` (${sq.label})`:''}</b>`:'';
  const dist=item.distNm&&isFinite(item.distNm)?`${item.distNm.toFixed(1)}\u202fNM`:'';
  return`<div class="pp-reg">${item.reg||item.hex||'Aircraft'}</div>
<div class="pp-row"><b>${cs||'No callsign'}</b>${sqH}<br>
${type}${dist?' \u00b7 '+dist:''}<br>
${fmtAlt(item.raw)} &middot; ${fmtSpd(item.raw)}<br>
${fmtTrack(item.raw)}</div>
<button class="pp-btn" onclick="window.__sel('${item.key}');this.closest('.leaflet-popup').remove()">Inspect \u2192</button>`;
}

/* ── RENDER PLANE LAYER ONLY (fast, no trail rebuild) ── */
function renderPlaneLayer(){
  if(!S.map)return;
  S.planeLayer.clearLayers();
  for(const item of S.allAC.values()){
    if(item.lat==null||item.lon==null)continue;
    const m=L.marker([item.lat,item.lon],{icon:makeIcon(item,item.key===S.selectedKey)})
      .addTo(S.planeLayer).bindPopup(buildPopup(item));
    m.on('click',()=>selectAircraft(item.key));
  }
}

/* ── FULL MAP RENDER (trails + planes + user) ── */
function renderMap(){
  ensureMap();
  S.userLayer.clearLayers();
  S.trailLayer.clearLayers();
  if(S.user){
    L.marker([S.user.lat,S.user.lon],{icon:makeUserIcon()})
      .addTo(S.userLayer)
      .bindPopup(`<div class="pp-reg">\u{1F4CD} You</div><div class="pp-row">${fmtCoords(S.user.lat,S.user.lon)}</div>`);
  }
  for(const[key,pts]of S.histories.entries()){
    if(pts.length<2)continue;
    for(let i=1;i<pts.length;i++){
      const a=pts[i-1],b=pts[i];
      L.polyline([[a.lat,a.lon],[b.lat,b.lon]],{
        color:trailCol((a.speed+b.speed)/2,(a.alt+b.alt)/2),
        weight:key===S.selectedKey?3.5:2,
        opacity:key===S.selectedKey?.92:.52,
        lineCap:'round',lineJoin:'round',
      }).addTo(S.trailLayer);
    }
  }
  renderPlaneLayer();
  const bounds=[];
  if(S.user)bounds.push([S.user.lat,S.user.lon]);
  S.nearby.forEach(i=>bounds.push([i.lat,i.lon]));
  if(!S.didInitialFit&&bounds.length>=2){S.map.fitBounds(bounds,{padding:[32,32],maxZoom:10});S.didInitialFit=true;}
  else if(!S.didInitialFit&&bounds.length===1){S.map.setView(bounds[0],10);S.didInitialFit=true;}
  setTimeout(()=>S.map.invalidateSize(),100);
}

/* ── NEAREST CARD HTML ── */
function makeNearestHtml(item){
  if(!item)return'<div class="empty">No aircraft in range.</div>';
  const meta=item.meta||{},live=item.live||item.raw||{},route=item.route||null;
  const photo=meta.url_photo_thumbnail||meta.url_photo||'';
  const reg=meta.registration||item.reg||item.hex||'\u2014';
  const cs=norm(live.flight||live.callsign||item.callsign);
  const type=meta.icao_type||meta.type||live.t||live.type||'';
  const owner=meta.registered_owner||'';
  const dist=item.distNm?.toFixed(1)||'\u2014';
  const sq=sqInfo(live.squawk||item.raw?.squawk);
  const air=isAirborne(live);
  return`<div class="nc-ey">Nearest aircraft &middot; ${dist}\u202fNM from you</div>
<div class="nc-body">
  <div class="ac-photo">${photo?`<img src="${photo}" alt="">`:'No photo'}</div>
  <div class="nc-main">
    <div class="reg-big">${reg}</div>
    <div class="tag-row">
      ${cs?`<span class="tag cyn">${cs}</span>`:''}
      ${type?`<span class="tag">${type}</span>`:''}
      ${sq?`<span class="tag ${sq.alert?'red':'amb'}">${sq.code}${sq.label?` &middot; ${sq.label}`:''}</span>`:''}
      ${owner?`<span class="tag">${owner}</span>`:''}
    </div>
    <div class="smini">
      <div class="sm"><div class="k">Altitude</div><div class="v ${air?'live':''}">${fmtAlt(live)}</div></div>
      <div class="sm"><div class="k">Speed</div><div class="v">${fmtSpd(live)}</div></div>
      <div class="sm"><div class="k">Track</div><div class="v">${fmtTrack(live)}</div></div>
      <div class="sm"><div class="k">Climb</div><div class="v">${fmtClimb(live)}</div></div>
      <div class="sm"><div class="k">Position</div><div class="v">${fmtCoords(pickN(live.lat,live.latitude),pickN(live.lon,live.longitude))}</div></div>
      <div class="sm"><div class="k">Last seen</div><div class="v">${fmtAgo(live.seen??live.seen_pos)}</div></div>
    </div>
  </div>
  <div class="route-col"><div class="rbox">${routeHtml(route,live)}</div></div>
</div>`;
}

/* ── SELECTED CARD HTML ── */
function makeSelectedHtml(item){
  if(!item)return'<div class="empty">Tap any aircraft on the map or list.</div>';
  const meta=item.meta||{},live=item.live||item.raw||{},route=item.route||null;
  const photo=meta.url_photo_thumbnail||meta.url_photo||'';
  const reg=meta.registration||item.reg||item.hex||'\u2014';
  const cs=norm(live.flight||live.callsign||item.callsign);
  const sq=sqInfo(live.squawk||item.raw?.squawk);
  const air=isAirborne(live);
  const rows=[
    ['Reg',reg,'amb'],
    cs?['Callsign',cs,'live']:null,
    sq?['Squawk',`${sq.code}${sq.label?' \u00b7 '+sq.label:''}`,(sq.alert?'red':'amb')]:null,
    ['Type',meta.icao_type||meta.type||live.t||live.type||'\u2014',''],
    ['Maker',meta.manufacturer||'\u2014',''],
    ['Owner',meta.registered_owner||'\u2014',''],
    ['ICAO',meta.mode_s||item.hex||'\u2014',''],
    ['Altitude',fmtAlt(live),(air?'live':'')],
    ['Speed',fmtSpd(live),''],
    ['Track',fmtTrack(live),''],
    ['Climb',fmtClimb(live),''],
    ['Distance',`${item.distNm?.toFixed(1)||'\u2014'}\u202fNM`,''],
    ['Position',fmtCoords(pickN(live.lat,live.latitude),pickN(live.lon,live.longitude)),''],
    ['Last seen',fmtAgo(live.seen??live.seen_pos),''],
  ].filter(Boolean);
  return`${photo?`<div class="sph"><img src="${photo}" alt=""></div>`:''}
<div class="dtbl">${rows.map(([k,v,c])=>`<div class="drow"><span class="dk">${k}</span><span class="dv ${c||''}">${v||'\u2014'}</span></div>`).join('')}</div>
${route?`<div class="rbox" style="margin-top:11px">
  <div style="font-size:9px;text-transform:uppercase;letter-spacing:.13em;font-weight:700;color:var(--mu2);margin-bottom:9px">Route</div>
  ${routeHtml(route,live)}
</div>`:''}`;}

/* ── RENDER FUNCTIONS ── */
function updateNearestCard(){
  el('nearestCard').innerHTML=S.nearby.length
    ?makeNearestHtml(S.nearby[0])
    :'<div class="empty">No active aircraft detected in range.</div>';
}
function renderSelected(){
  el('selCard').innerHTML=makeSelectedHtml(S.selectedInfo);
  el('selPill').textContent=S.selectedInfo?(S.selectedInfo.reg||S.selectedInfo.hex||'Aircraft'):'None';
}
function renderNearbyList(){
  const box=el('nbList');
  if(!S.nearby.length){box.innerHTML='<div class="empty">No aircraft in range.</div>';return;}
  box.innerHTML='';
  S.nearby.slice(0,14).forEach(item=>{
    const cs=norm(item.raw?.flight||item.callsign);
    const sq=sqInfo(item.raw?.squawk);
    const type=item.raw?.t||item.raw?.type||'';
    const btn=document.createElement('button');
    btn.className=`nb-btn${item.key===S.selectedKey?' active':''}`;
    btn.innerHTML=`<div class="nb-l">
      <div class="nb-reg">${item.reg||item.hex||'Aircraft'}</div>
      <div class="nb-meta">${cs||'\u2014'} \u00b7 ${type||'?'} \u00b7 ${fmtAlt(item.raw)}${sq&&sq.alert?` <span class="nb-sq">\u00b7 ${sq.code}</span>`:''}</div>
    </div>
    <div class="nb-dist">${item.distNm.toFixed(1)}\u202fNM</div>`;
    btn.onclick=()=>selectAircraft(item.key);
    box.appendChild(btn);
  });
}

/* ── FETCHING ── */
async function fetchJSON(url,sig){
  const r=await fetch(url,{signal:sig,mode:'cors'});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();
}

async function fetchAcInfo(item){
  const reg=item.reg||item.hex||item.key;
  const cs=norm(item.callsign||item.raw?.flight||item.raw?.callsign);
  const urls=[];
  if(reg)urls.push(`${DB}/aircraft/${encodeURIComponent(reg)}`);
  if(cs)urls.push(`${DB}/callsign/${encodeURIComponent(cs)}`);
  let meta=null,route=null;
  for(const url of urls){
    try{
      const p=await fetchJSON(url);
      const rsp=p?.response||p;
      if(rsp?.aircraft&&!meta)meta=rsp.aircraft;
      if(rsp?.flightroute&&!route)route=rsp.flightroute;
      if(!meta&&(rsp?.type||rsp?.icao_type))meta=rsp;
    }catch(_){}
  }
  return{meta,route};
}

async function loadNearby(){
  if(!S.user)return;
  const pl=await fetchJSON(`${API}/v2/point/${S.user.lat}/${S.user.lon}/${USER_RANGE}`);
  const aircraft=pl?.ac||pl?.aircraft||[];
  mergeAircraft(aircraft,true);
  if(!S.selectedKey||!S.allAC.has(S.selectedKey))S.selectedKey=S.nearby[0]?.key||null;
  S.selectedInfo=S.selectedKey?S.allAC.get(S.selectedKey)||null:null;
  updateNearestCard();renderSelected();renderNearbyList();renderMap();
  el('trafficCount').textContent=`${S.allAC.size} aircraft`;
  setStatus(S.nearby.length?`${S.nearby.length} nearby`:'No traffic nearby',S.nearby.length?'live':'warn');
  /* Auto-fetch info for nearest + selected */
  if(S.nearby.length){
    const nearest=S.nearby[0];
    if(!nearest.meta&&!nearest.route){
      fetchAcInfo(nearest).then(({meta,route})=>{
        if(meta)nearest.meta=meta;if(route)nearest.route=route;
        nearest.live=nearest.raw;
        S.allAC.set(nearest.key,nearest);
        updateNearestCard();
        if(S.selectedKey===nearest.key){S.selectedInfo=nearest;renderSelected();}
      }).catch(_=>{});
    }
  }
}

async function selectAircraft(key){
  const item=S.allAC.get(key);if(!item)return;
  S.selectedKey=key;S.selectedInfo=item;
  renderSelected();renderNearbyList();renderPlaneLayer();
  if(S.map&&item.lat!=null)S.map.panTo([item.lat,item.lon],{animate:true});
  try{
    const{meta,route}=await fetchAcInfo(item);
    if(S.selectedKey!==key)return;
    if(meta)item.meta=meta;if(route)item.route=route;
    item.live=item.raw;S.selectedInfo=item;
    S.allAC.set(key,item);
    if(S.nearby[0]?.key===key)updateNearestCard();
    renderSelected();renderNearbyList();renderPlaneLayer();
  }catch(_){renderSelected();}
}

async function locateUser(){
  if(!navigator.geolocation){
    setStatus('Geolocation unavailable','bad');
    el('nearestCard').innerHTML='<div class="empty">Geolocation not supported.</div>';return;
  }
  navigator.geolocation.getCurrentPosition(async pos=>{
    S.user={lat:pos.coords.latitude,lon:pos.coords.longitude};
    setStatus('Loading\u2026','warn');
    ensureMap();drawRings(S.user.lat,S.user.lon);
    S.map.setView([S.user.lat,S.user.lon],10);
    try{
      await loadNearby();
      if(!S.refreshTimer){
        S.refreshTimer=setInterval(async()=>{
          try{await loadNearby();}catch(_){setStatus('Update failed','bad');}
        },REFRESH_MS);
      }
    }catch(e){setStatus('Failed to load traffic','bad');}
  },()=>{
    setStatus('Location denied','bad');
    el('nearestCard').innerHTML='<div class="empty">Location access denied. Allow location access and reload.</div>';
  },{enableHighAccuracy:true,timeout:12000,maximumAge:60000});
}

/* ── INIT ── */
window.__sel=selectAircraft;
function init(){
  ensureMap();updateNearestCard();renderSelected();renderNearbyList();
  setStatus('Locating\u2026','warn');locateUser();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();

</script>
