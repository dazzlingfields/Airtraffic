<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  color-scheme: light dark;
}
body {
  margin:0;
  font-family: system-ui;
}
#top { padding:12px; font-weight:bold; }
#container { display:flex; height:90vh; }
#map { flex:2; }
#side { flex:1; padding:12px; overflow:auto; border-left:1px solid #ccc; }
</style>
</head>
<body>
<div id="top">Nearest aircraft: <span id="nearest"></span></div>
<div id="container">
  <div id="map"></div>
  <div id="side">Select an aircraft</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = "https://api.airplanes.live/v2/point/";
const ADSBDB = "https://api.adsbdb.com/v0/callsign/";

let map = L.map("map");
let layer = L.layerGroup().addTo(map);
let trails = {};

function getIcon(type, speed) {
  let size = 20;
  let symbol = "✈";

  if (/A3|B7|B8|A35|A38/.test(type)) size = 28; // big jet
  else if (/B|A/.test(type)) size = 24; // jet
  else if (/DH|ATR|Q/.test(type)) symbol = "🛩";
  else if (/C|PA|BE/.test(type)) symbol = "🛫";
  if (/H/.test(type)) symbol = "🚁";

  return L.divIcon({
    html: `<div style="font-size:${size}px">${symbol}</div>`,
    className: "",
    iconSize: [size,size]
  });
}

function colorByFlight(alt, speed) {
  if (alt > 30000) return "#ef4444";
  if (speed > 300) return "#f59e0b";
  return "#34d399";
}

async function getRoute(callsign) {
  try {
    const res = await fetch(ADSBDB + callsign);
    const d = await res.json();
    return d.response?.flights?.[0] || null;
  } catch { return null; }
}

function updateTrail(ac) {
  if (!trails[ac.hex]) trails[ac.hex] = [];
  trails[ac.hex].push([ac.lat, ac.lon]);
  if (trails[ac.hex].length > 20) trails[ac.hex].shift();
}

function drawTrail(ac) {
  const t = trails[ac.hex];
  if (!t || t.length < 2) return;

  for (let i=1;i<t.length;i++) {
    L.polyline([t[i-1], t[i]], {
      color: colorByFlight(ac.alt_baro||0, ac.gs||0),
      weight:2
    }).addTo(layer);
  }
}

async function load(lat, lon) {
  const res = await fetch(`${API}${lat}/${lon}/150`);
  const data = await res.json();
  return data.ac || [];
}

async function update(lat, lon) {
  layer.clearLayers();
  const list = await load(lat, lon);

  let nearest = null;
  let min = Infinity;

  list.forEach(ac => {
    if (!ac.lat) return;

    const d = Math.hypot(lat-ac.lat, lon-ac.lon);
    if (d < min && ac.alt_baro > 0) {
      min = d;
      nearest = ac;
    }

    updateTrail(ac);

    const icon = getIcon(ac.t||"", ac.gs);

    const m = L.marker([ac.lat, ac.lon], {icon}).addTo(layer);

    m.on("click", async () => {
      const route = await getRoute(ac.flight?.trim());
      document.getElementById("side").innerHTML = `
        <b>${ac.flight||ac.hex}</b><br>
        Type: ${ac.t||"?"}<br>
        Alt: ${ac.alt_baro||"?"} ft<br>
        Speed: ${ac.gs||"?"} kt<br>
        From: ${route?.origin||"?"}<br>
        To: ${route?.destination||"?"}
      `;
    });

    drawTrail(ac);
  });

  if (nearest) {
    document.getElementById("nearest").textContent = nearest.flight || nearest.hex;
  }
}

navigator.geolocation.getCurrentPosition(pos => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  map.setView([lat, lon], 9);

  setInterval(() => update(lat, lon), 4000);
});
</script>
</body>
</html>
